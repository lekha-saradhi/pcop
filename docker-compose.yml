services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pcop}
      POSTGRES_USER: ${POSTGRES_USER:-pcop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pcop_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pcop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlruns.db
      --default-artifact-root /mlflow/artifacts

  # ── Bank API ────────────────────────────────────────────────────────────────
  bank:
    build:
      context: ./bank
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-pcop}:${POSTGRES_PASSWORD:-pcop_dev}@postgres:5432/${POSTGRES_DB:-pcop}

  # ── Express Gateway ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_started
      bank:
        condition: service_started
    environment:
      PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      BANK_API_BASE_URL: http://bank:3001
    env_file:
      - ./server/.env

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}

  # ── Chronos ML Scoring ──────────────────────────────────────────────────────
  scoring:
    build:
      context: ./chronos
      dockerfile: services/scoring/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    volumes:
      - ./chronos/ml/checkpoints:/app/ml/checkpoints:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pcop}:${POSTGRES_PASSWORD:-pcop_dev}@postgres:5432/${POSTGRES_DB:-pcop}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /app
    env_file:
      - ./chronos/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  mlflow_data:
